<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" th:href="@{/img/logo.png}" type="image/x-icon" />
    <title>IDS - Server</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/sharedparts.css}" />
    <link rel="stylesheet" th:href="@{/css/nav-server.css}" />
    <link rel="stylesheet" th:href="@{/css/server.css}" />
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/nav-server.js}"></script>
    <script th:src="@{/js/server.js}"></script>
  </head>
  <body>
    <aside th:replace="sharedparts/sidebar-server::sidebar-server"></aside>
    <div class="main">
      <header th:replace="sharedparts/header::header"></header>
      <div class="container">
        <h1>Thông tin Server</h1>
        <div class="container1 form-container">
          <form class="server-info-form" autocomplete="off">
            <div class="form-group">
              <label for="host">Địa chỉ IP:</label>
              <input
                type="text"
                th:value="${server.host}"
                class="form-control no"
                readonly
              />
            </div>
            <div class="form-group">
              <label for="user">Username:</label>
              <input
                type="text"
                th:value="${server.user}"
                class="form-control no"
                readonly
              />
            </div>
            <div class="form-group">
              <label for="post">Cổng:</label>
              <input
                type="text"
                th:value="${server.post}"
                class="form-control no"
                readonly
              />
            </div>
            <div class="form-group">
              <label for="password">Password:</label>
              <input
                type="password"
                th:value="${server.password}"
                class="form-control no"
                readonly
              />
            </div>
            <div class="form-group">
              <label for="nickname">Tên thay thế:</label>
              <input
                type="text"
                th:value="${server.nickname}"
                class="form-control no"
                readonly
              />
            </div>
            <div class="action-buttons">
              <button
                type="button"
                class="delete-btn"
                th:data-host="${server.host}"
              >
                <i class="fa fa-trash"></i> Delete
              </button>
              <button
                type="submit"
                class="update-btn"
                th:data-host="${server.host}"
              >
                <i class="fas fa-edit"></i> Update
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div th:replace="sharedparts/nav-server::nav-server"></div>
  </body>
</html>
