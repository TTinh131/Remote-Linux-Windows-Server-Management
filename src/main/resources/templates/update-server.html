<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" th:href="@{/img/logo.png}" type="image/x-icon" />
    <title>IDS - Update Server</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/sharedparts.css}" />
    <link rel="stylesheet" th:href="@{/css/nav-server.css}" />
    <link rel="stylesheet" th:href="@{/css/server.css}" />
    <script th:src="@{/js/sidebar.js}"></script>
    <script th:src="@{/js/nav-server.js}"></script>
    <style>
      ::placeholder {
        color: rgb(203, 199, 199);
      }
    </style>
  </head>
  <body>
    <aside th:replace="sharedparts/sidebar-server::sidebar-server"></aside>
    <div class="main">
      <header th:replace="sharedparts/header::header"></header>
      <div class="container">
        <h1>Update Server</h1>
        <div class="container1 form-container">
          <form class="server-info-form" method="post" th:action="@{/server/update}" autocomplete="off">
            <input type="hidden" name="originalHost" th:value="${server.host}">
            <div class="form-group no">
              <label for="host">Địa chỉ IP:</label>
              <input
                id="host"
                name="host"
                type="text"
                th:value="${server.host}"
                class="form-control"
                readonly
              />
            </div>
            <div class="form-group">
              <label for="user">Username:</label>
              <input
                name="username"
                type="text"
                th:placeholder="${server.user}"
                class="form-control"
                required
              />
            </div>
            <div class="form-group">
              <label for="post">Cổng:</label>
              <input
                type="number"
                name="post"
                th:placeholder="${server.post}"
                class="form-control"
                min="1"
                max="65535"
                required
              />
            </div>
            <div class="form-group">
              <label for=password"">Password:</label>
              <input
               name="password"
                type="password"
                th:placeholder="Password"
                class="form-control"
                required
              />
            </div>
            <div class="form-group">
              <label for="alias">Tên thay thế:</label>
              <input
               name="alias"
                type="text"
                th:placeholder="${server.nickname}"
                class="form-control"
              />
            </div>
            <div class="action-buttons">
              <button
                type="button"
                class="delete-btn"
                th:data-host="${server.host}"
                th:href="@{/server(host=${server.host})}"
              >
                <i class="fa fa-arrow-left"></i> Exit
              </button>
              <button
                type="submit"
                class="update-btn"
                th:data-host="${server.host}"
              >
                <i class="fas fa-edit"></i> Update
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div th:replace="sharedparts/nav-server::nav-server"></div>
  </body>
</html>
<script>
  document.querySelector(".delete-btn").addEventListener("click", function (e) {
    e.preventDefault();
    const host = this.getAttribute("data-host");
    window.location.href = `/server?host=${encodeURIComponent(host)}`;
  });
</script>
